# This workflow will install Python dependencies, run tests  of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: CI for loan Application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: give access of repo code to the workflow
      uses: actions/checkout@v4 # it is standard github action used to clone your repository code into the runner environment so your workflow can acces and operate on the files of your repository
    - name: Set up Python 3.12.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.12.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt 
    - name: Test with pytest
      run: |
        pytest
